events {}

http {

    include /etc/nginx/nginx-common.conf;

    resolver 127.0.0.11 valid=10s;

    server {

        listen 80;

        location / {

            set $upstream app:5000;

            proxy_pass http://$upstream;

            proxy_set_header X-Forwarded-For $real_xff;
        }
    }
}
